<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Explorer - No API Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ... Style CSS sebelumnya tetap sama ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 1200px; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px; }
        h1 { font-size: 2.2rem; font-weight: 600; color: #2d3748; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        h1 i { color: #667eea; }
        .subtitle { color: #718096; margin-bottom: 30px; font-size: 1rem; border-left: 4px solid #667eea; padding-left: 16px; }
        
        /* Tombol Reset Style */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-reset { background: #e53e3e; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; display: none; transition: 0.3s; }
        .btn-reset:hover { background: #c53030; transform: translateY(-2px); }

        .upload-area { background: #f7fafc; border: 2px dashed #cbd5e0; border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-area:hover { border-color: #667eea; background: #f0f4f8; }
        #upload { display: none; }
        
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .preview-card, .info-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .preview-header, .info-header, .map-header { background: #f8f9fa; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #2d3748; display: flex; align-items: center; gap: 8px; }
        .preview-image { width: 100%; height: 300px; object-fit: contain; background: #f1f5f9; display: block; }
        .info-content { padding: 20px; max-height: 400px; overflow-y: auto; font-size: 0.9rem; }
        .exif-item { display: flex; border-bottom: 1px solid #edf2f7; padding: 8px 0; }
        .exif-tag { font-weight: 600; color: #4a5568; width: 40%; }
        .exif-value { color: #2d3748; word-break: break-all; width: 60%; }

        .map-card { grid-column: span 2; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; margin-top: 10px; }
        #map { height: 350px; width: 100%; z-index: 1; }
        #loading { display: none; text-align: center; color: #667eea; margin: 20px 0; }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } .map-card { grid-column: span 1; } }
    </style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr@latest/dist/lite.umd.js"></script>
</head>
<body>
    <div class="container">
        <div class="action-bar">
            <h1><i class="fas fa-camera-retro"></i> EXIF Explorer</h1>
            <button class="btn-reset" id="btnReset"><i class="fas fa-sync"></i> Reset</button>
        </div>
        
        <div class="subtitle" id="subtitleText">
            Unggah foto untuk melihat metadata EXIF dan lokasi tanpa perlu API Key.
        </div>

        <label for="upload" class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #667eea; margin-bottom: 15px;"></i>
            <p>Pilih foto atau seret ke sini</p>
            <small>JPEG, PNG, HEIC (max 20MB)</small>
        </label>
        <input type="file" id="upload" accept="image/*">

        <div id="loading"><i class="fas fa-spinner fa-spin"></i> Memproses file...</div>

        <div class="content-grid" id="contentGrid" style="display: none;">
            <div class="preview-card">
                <div class="preview-header"><i class="fas fa-image"></i> Pratinjau</div>
                <img id="preview" class="preview-image" src="" alt="Preview">
            </div>

            <div class="info-card">
                <div class="info-header"><i class="fas fa-info-circle"></i> Metadata EXIF</div>
                <div class="info-content" id="exifInfo"></div>
            </div>

            <div class="map-card" id="mapCard" style="display: none;">
                <div class="map-header"><i class="fas fa-map-marker-alt"></i> Lokasi Pengambilan</div>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script>
        const uploadInput = document.getElementById('upload');
        const uploadArea = document.getElementById('uploadArea');
        const btnReset = document.getElementById('btnReset');
        const contentGrid = document.getElementById('contentGrid');
        const previewImg = document.getElementById('preview');
        const exifInfoDiv = document.getElementById('exifInfo');
        const mapCard = document.getElementById('mapCard');
        const loadingDiv = document.getElementById('loading');

        let leafletMap = null;
        let marker = null;

        // Inisialisasi Peta Leaflet (Gratis & No API Key)
        function initLeafletMap(lat, lng) {
            mapCard.style.display = 'block';
            
            // Hapus instance peta jika sudah ada (saat ganti foto)
            if (leafletMap !== null) {
                leafletMap.remove();
            }

            leafletMap = L.map('map').setView([lat, lng], 15);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(leafletMap);

            marker = L.marker([lat, lng]).addTo(leafletMap)
                .bindPopup('Lokasi Foto')
                .openPopup();
            
            // Perbaiki glitch render Leaflet dalam container tersembunyi
            setTimeout(() => { leafletMap.invalidateSize(); }, 200);
        }

        // Fungsi Reset
        function resetApp() {
            uploadInput.value = '';
            contentGrid.style.display = 'none';
            mapCard.style.display = 'none';
            btnReset.style.display = 'none';
            uploadArea.style.display = 'block';
            previewImg.src = '';
            exifInfoDiv.innerHTML = '';
            if (leafletMap) {
                leafletMap.remove();
                leafletMap = null;
            }
        }

        btnReset.addEventListener('click', resetApp);

        uploadArea.addEventListener('click', () => uploadInput.click());

        uploadInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            loadingDiv.style.display = 'block';
            uploadArea.style.display = 'none';

            // Preview
            const reader = new FileReader();
            reader.onload = (event) => { previewImg.src = event.target.result; };
            reader.readAsDataURL(file);

            try {
                const output = await exifr.parse(file, { gps: true });
                contentGrid.style.display = 'grid';
                btnReset.style.display = 'block';

                if (!output) {
                    exifInfoDiv.innerHTML = '<p>Tidak ada data EXIF ditemukan.</p>';
                } else {
                    renderExif(output);
                    
                    if (output.latitude && output.longitude) {
                        initLeafletMap(output.latitude, output.longitude);
                    } else {
                        mapCard.style.display = 'none';
                    }
                }
            } catch (error) {
                exifInfoDiv.innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        function renderExif(output) {
            let html = '';
            for (let [key, value] of Object.entries(output)) {
                if (['thumbnail', 'imageBuffer', 'thumbnailBuffer'].includes(key)) continue;
                
                let val = value;
                if (value instanceof Date) val = value.toLocaleString('id-ID');
                if (typeof value === 'object') val = JSON.stringify(value).substring(0, 50) + '...';
                
                html += `
                    <div class="exif-item">
                        <span class="exif-tag">${key}</span>
                        <span class="exif-value">${val}</span>
                    </div>`;
            }
            exifInfoDiv.innerHTML = html;
        }

        // Drag & Drop
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#667eea'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#cbd5e0'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length) {
                uploadInput.files = files;
                uploadInput.dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
